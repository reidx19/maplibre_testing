<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>

<style>
body {
  margin:0;
  display:flex;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
}

/* SIDEBAR */
#sidebar {
  width:260px;
  background:white;
  box-shadow:2px 0 5px rgba(0,0,0,0.2);
  padding:10px;
  transition:width 0.3s;
  overflow:hidden;
}

#sidebar.collapsed {
  width:0;
  padding:0;
}

/* MAP */
#map {
  flex:1;
}

/* Toggle button */
#toggle-btn {
  position:absolute;
  top:10px;
  left:260px;
  z-index:20;
  background:white;
  border:none;
  padding:6px 10px;
  border-radius:4px;
  cursor:pointer;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
  transition:left 0.3s;
}

#sidebar.collapsed + #toggle-btn {
  left:10px;
}

/* Floating UI */
#layer-control, #legend {
  position:absolute;
  left:280px;
  background:white;
  padding:10px;
  border-radius:6px;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
}

#layer-control { top:10px; }
#legend { bottom:20px; }

.legend-row{
  display:flex;
  align-items:center;
  margin-bottom:4px;
}
.legend-color{
  width:18px;
  height:18px;
  margin-right:6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>BikewaySim Framework Maps</h3>
  <button class="map-btn" data-map="origin_impedance_change">Origin Weighted Impedance Change by TAZ</button>
  <button class="map-btn" data-map="impedance_contribution">Impedance Contribution</button>
  <button class="map-btn" data-map="lbc">Link Betweenness Centrality</button>

  <hr>
  <div id="map-description"></div>
</div>

<button id="toggle-btn">⬅</button>

<div id="map"></div>

<!-- FLOATING UI -->
<div id="layer-control"></div>
<div id="legend"></div>

<script>
// =======================
// PMTiles
// =======================
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

// =======================
// MAP INIT
// =======================
const map = new maplibregl.Map({
  container:"map",
  center:[-84.3658,33.7624],
  zoom:12,
  minZoom:12,
  maxZoom:16,
  style:{
    version:8,
    sources:{
      base:{
        type:"raster",
        tiles:["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"],
        tileSize:256
      },
      data:{
        type:"vector",
        url:"pmtiles://merged.pmtiles"
      }
    },
    layers:[
      { id:"base", type:"raster", source:"base" },

      // POLYGON LAYER (hidden by default)
      {
        id:"origin_weighted_impedance_change",
        type:"fill",
        source:"data",
        "source-layer":"taz_polygons",
        layout: { visibility: 'none' },
        paint:{
          "fill-color":[
            "match",
            ["get","jenks_class"],
            0,"#f7fbff",
            1,"#c6dbef",
            2,"#6baed6",
            3,"#2171b5",
            4,"#08306b",
            "#cccccc"
          ],
          "fill-opacity":0.7
        },
      },

      // LINE LAYERS (hidden by default)
      {
        id:"lbc",
        type:"line",
        source:"data",
        "source-layer":"comb_framework_network_data",
        layout: { visibility: 'none' },
        paint:{ "line-color":"#2171b5","line-width":2 }
      },

      {
        id:"impedance_contribution_lyr",
        type:"line",
        source:"data",
        "source-layer":"impedance_contribution",
        layout: { visibility: 'none' },
        paint:{
          "line-color":"#00ff00",
          "line-width": [
            "interpolate",
            ["linear"],
            ["get","undirected_impedance_contribution_per_mi"],
            199286.30, 1,
            34138061.46, 50,
          ]
        }
      }
    ]
  }
});

// =======================
// MAP CONFIGS
// =======================
const MAP_CONFIGS = {

  origin_impedance_change: {
    description: `This map shows impedance changes across the network.`,
    layers: ["origin_weighted_impedance_change"],
    controls: [
      { id:"origin_weighted_impedance_change", label:"Origin Weighted Impedance Change by TAZ" }
    ],
    legend: `
      <b>Impedance Change</b>
      <div class="legend-row"><div class="legend-color" style="background:#f7fbff"></div>Class 1</div>
      <div class="legend-row"><div class="legend-color" style="background:#c6dbef"></div>Class 2</div>
      <div class="legend-row"><div class="legend-color" style="background:#6baed6"></div>Class 3</div>
      <div class="legend-row"><div class="legend-color" style="background:#2171b5"></div>Class 4</div>
      <div class="legend-row"><div class="legend-color" style="background:#08306b"></div>Class 5</div>
    `
  },

  impedance_contribution: {
    description: `This map shows how each improvement reduces impedance`,
    layers: ["impedance_contribution_lyr"],
    controls: [
      { id:"impedance_contribution_lyr", label:"Impedance Contribution" }
    ],
    legend: `
      <b>Impedance</b>
      <div class="legend-row">
        <div class="legend-color" style="background:#2171b5"></div>
        Testing
      </div>
    `
  },

  lbc: {
    description: `Link Betweenness Centrality.`,
    layers: ["lbc"],
    controls: [
      { id:"lbc", label:"Link Betweenness Centrality" }
    ],
    legend: null
  }

};

// =======================
// BUILD LAYER CONTROL
// =======================
function buildLayerControl(config){
  const container = document.getElementById("layer-control");
  container.innerHTML = "<b>Layers</b><br>" +
    config.controls.map(l => `
      <label>
        <input type="checkbox" data-layer="${l.id}" checked>
        ${l.label}
      </label><br>
    `).join("");

  container.querySelectorAll("[data-layer]").forEach(input=>{
    input.addEventListener("change",(e)=>{
      const id = e.target.dataset.layer;
      map.setLayoutProperty(id, "visibility", e.target.checked ? "visible":"none");
    });
  });
}

// =======================
// BUILD LEGEND
// =======================
function buildLegend(config){
  const el = document.getElementById("legend");
  if(!config.legend){
    el.style.display = "none";
    return;
  }
  el.style.display = "block";
  el.innerHTML = config.legend;
}

// =======================
// SWITCH MAP
// =======================
function switchMap(name){
  const config = MAP_CONFIGS[name];

  // hide all layers
  Object.values(MAP_CONFIGS).forEach(cfg=>{
    cfg.layers.forEach(id=>{
      if(map.getLayer(id)){
        map.setLayoutProperty(id,"visibility","none");
      }
    });
  });

  // show selected layers
  config.layers.forEach(id=>{
    if(map.getLayer(id)){
      map.setLayoutProperty(id,"visibility","visible");
    }
  });

  // update UI
  document.getElementById("map-description").innerHTML = config.description;

  buildLayerControl(config);
  buildLegend(config);
}

// =======================
// SIDEBAR EVENTS
// =======================
document.querySelectorAll(".map-btn").forEach(btn=>{
  btn.onclick = ()=> switchMap(btn.dataset.map);
});

// =======================
// TOGGLE SIDEBAR
// =======================
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggle-btn");

toggleBtn.onclick = () => {
  sidebar.classList.toggle("collapsed");
  const isCollapsed = sidebar.classList.contains("collapsed");
  toggleBtn.textContent = isCollapsed ? "➡" : "⬅";
  const offset = isCollapsed ? 20 : 280;
  document.getElementById("layer-control").style.left = offset + "px";
  document.getElementById("legend").style.left = offset + "px";
  setTimeout(() => map.resize(), 310);
};

// =======================
// INIT (no map shown until user clicks)
map.on("load",()=>{
  // nothing visible by default; user chooses map
});
</script>

</body>
</html>
